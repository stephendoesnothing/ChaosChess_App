name: Deploy Chaos Chess

on:
  push:
    branches: ["main"]

# The permission slip
permissions:
  contents: write 

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # We replaced the complicated Node/npm setup with a single, dedicated deploy tool
      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
